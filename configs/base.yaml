runtime:
  input_path: test_set/01.txt
  output_root: outputs
  run_name_prefix: baseline
  device: cuda
  torch_dtype: float16
  repo_root: .

model:
  backend: diffusers_text2img
  granularity: scene
  model_id: stabilityai/sdxl-turbo
  width: 512
  height: 512
  guidance_scale: 0.0
  num_inference_steps: 4
  enable_attention_slicing: true

prompt:
  pipeline: rule_based
  rewriter:
    type: rule_based
  cache:
    enabled: true
    cache_dir: .cache/prompt_builder
  artifact:
    path: null
    export_enabled: false
    export_dir: prompt_artifacts/llm_assisted_v7
  llm:
    provider: openai
    model: gpt-4o-2024-08-06
    api_key_env: OPENAI_API_KEY
    temperature: 0.0
    max_output_tokens: 800
    timeout_seconds: 30
    schema_version: v1
    builder_version: llm_assisted_v7
    fallback_to_rule_based: true
  style_prompt: cinematic story illustration, coherent visual style
  subject_prefix: "main subject:"
  global_context_prefix: "shared story context:"
  setting_prefix: "recurring setting:"
  replace_leading_pronouns: true
  human_identity_prompt: same person across all scenes, consistent face, hairstyle, outfit, accessories, and body proportions
  animal_identity_prompt: same animal across all scenes, consistent breed, fur pattern, body proportions, and markings
  generic_identity_prompt: same subject identity across all scenes, consistent shape, colors, proportions, and surface details
  scene_continuity_prompt: maintain a consistent background identity, lighting direction, color palette, and visual tone across the sequence unless the text clearly changes them
  action_emphasis_template: "key action: {action_phrase}"
  default_action_prompt: show the action clearly with an unambiguous pose
  scene_composition_prompt: keep the full pose and scene relationship easy to read
  generation_include_style: true
  generation_include_global_context: false
  generation_include_quality_suffix: false
  generation_include_scene_composition: false
  generation_max_words: 28
  generation_max_chars: 220
  generation_template: "{subject}, {action}{setting_clause}{style_clause}"
  scoring_template: "{subject}, {action}{setting_clause}"
  scoring_include_style: false
  scoring_include_global_context: false
  scoring_max_words: 20
  scoring_max_chars: 160
  action_emphasis_map:
    makes breakfast: preparing breakfast with food and kitchen tools visible
    looks out: looking out through the window, gaze directed outside, quiet contemplative pose
    sits down: clearly seated or transitioning into a seated pose, body posture visibly sitting
    eat: food and eating setup clearly visible
    drives: driving posture, hands near the steering wheel, seated inside the vehicle
    stops: motion clearly paused, subject visibly stopped
    take a break: resting posture, pause in action clearly shown
    runs: active running pose, full body motion visible
    chases: chasing motion, target interaction clearly visible
    returns: returning movement back toward the earlier direction
    paints: painting action clearly shown with canvas and tools visible
  quality_suffix: clean composition, readable action, consistent framing
  negative_prompt: blurry, distorted, low detail, bad anatomy, extra limbs, duplicate subjects

generation:
  candidate_count: 3
  base_seed: 1234
  routing:
    img2img_enabled: false
    route_policy: disabled
    use_previous_selected_as_init: true
    text2img_when_composition_change_needed: false
    img2img_strength: 0.45
    strength_by_change_level:
      small: 0.35
      medium: 0.65
      large: 0.85
    execution_by_change_level:
      small: img2img
      medium: img2img
      large: text2img
    large_change_keywords:
      - meanwhile
      - later
      - next day
      - in another
      - at a different
      - arrives
      - leaves
  identity_conditioning:
    enabled: false
    adapter_type: ip_adapter
    anchor_source: character_anchor_bank
    anchor_type: half_body
    apply_to_modes:
      - text2img
    scale: 0.6
    adapter_model_id: h94/IP-Adapter
    adapter_subfolder: sdxl_models
    adapter_weight_name: ip-adapter_sdxl.bin
    fail_on_missing_anchor: true
  anchor_bank:
    enabled: false
    generate: false
    anchor_types:
      - portrait
      - half_body
    output_dir_name: anchors
    base_seed_offset: 900000
    half_body_candidate_count: 3
    half_body_selector:
      method: clip_text_alignment
      clip_model_id: openai/clip-vit-base-patch32
      clip_max_text_length: 77
    prompt_suffix: clean identity reference image, simple background, consistent character design

scoring:
  type: clip_consistency
  clip_model_id: openai/clip-vit-base-patch32
  clip_max_text_length: 77
  text_image_weight: 0.45
  consistency_weight: 0.35
  action_weight: 0.2
  route_aware:
    enabled: false
    consistency_weight_by_change_level:
      small: 0.30
      medium: 0.10
      large: 0.0
    over_similarity_penalty:
      enabled: true
      threshold_by_change_level:
        small: null
        medium: 0.90
        large: 0.85
      penalty_weight_by_change_level:
        medium: 0.15
        large: 0.25

